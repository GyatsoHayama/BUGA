<!DOCTYPE html>
<html lang="de">
<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUGA</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/protocol.css">
    
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-group">
                <a href="index.html" class="logo">
                    <img src="img/Logo_Wuppertal.jpg" alt="Logo">
                </a>
                <div class="logo">
                    <h1><span>Bundesgartenschau</span> <span>Wuppertal</span></h1>
                </div>
            </div>
            <div id="dropdown-menu"></div>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Protokolle</h1>
            <p>Wähle ein Protokoll aus der Liste und lies es direkt hier im Browser.</p>
        </div>

        <section class="protocol-app">
            <aside class="protocol-selector">
                <label for="protocol-select">Protokoll auswählen</label>
                <select id="protocol-select" aria-label="Protokoll auswählen">
                    <option value="">-- Bitte wählen --</option>
                </select>
                <button id="load-protocol" type="button">Protokoll anzeigen</button>
                <p id="load-message" class="protocol-meta">Hier wird das ausgewählte Protokoll geladen.</p>
            </aside>

            <section class="protocol-viewer">
                <div class="protocol-meta">
                    <strong>Ausgewähltes Protokoll:</strong>
                    <span id="protocol-name">Keines gewählt</span>
                </div>
                <iframe id="protocol-frame" title="Protokoll anzeigen" src="" loading="lazy" style="width: 100%; min-height: 60vh; border: 1px solid #d3d3d3; border-radius: 10px;"></iframe>
                <noscript>
                    <p>JavaScript ist erforderlich, um das Protokoll hier anzuzeigen. Öffne die Datei direkt aus dem Ordner.</p>
                </noscript>
            </section>
        </section>
    </main>
    <footer>
        <div class="footer-container">
            <a href="index.html">Startseite</a>
            <a href="ueber-uns.html">Über uns</a>
            <a href="impressum.html">Impressum</a>
        </div>
    </footer>

    <script src="scripts/dropdown.js"></script>
    <script src="scripts/protokoll.js"></script>

</body>
</html>
