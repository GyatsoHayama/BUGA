<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <meta name="theme-color" content="#000000" />

  <title>POI AR App</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <!-- Für look-at bei den Labels -->
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header id="topbar" aria-live="polite">
    <div id="status">
      Starte AR-App...
    </div>

    <button id="permissionButton" type="button">
      Sensoren erlauben
    </button>

    <button id="locateButton" type="button">
      Standort bestimmen
    </button>
  </header>

  <section id="poiPanel" aria-hidden="true">
    <h2 id="poiTitle">POI</h2>
    <p id="poiDescription"></p>
    <p id="poiDistance"></p>

    <button id="closePanel" type="button">
      Schließen
    </button>
  </section>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  >
    <a-camera
  gps-camera
  rotation-reader
  look-controls="touchEnabled: false; mouseEnabled: false"
  wasd-controls="enabled: false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable"
></a-camera>
  </a-scene>

  <script src="./app.js"></script>
</body>
</html>
