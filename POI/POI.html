<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css" />
    <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>

    <title>BUGA POI</title>
</head>

<body>

    <header>
        <div class="header-container">

            <div class="logo-group">

                <div class="logo">
                    <img src="img/Logo_Wuppertal.jpg" alt="Logo">
                </div>

                <div class="logo">
                    <h1>
                        <span>Bundesgartenschau</span>
                        <span>Wuppertal</span>
                    </h1>
                </div>

            </div>

            <div id="dropdown-menu"></div>

        </div>
    </header>

    <!-- Inhalt wird hier geladen -->
    <main id="content">

        <p>Inhalt wird geladen...</p>

    </main>

    <footer>
        <div class="footer-container">
            <a href="index.html">Startseite</a>
            <a href="ueber-uns.html">Über uns</a>
            <a href="impressum.html">Impressum</a>
        </div>
    </footer>

    <script src="scripts/dropdown.js"></script>

    <script>
        fetch('index.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Datei konnte nicht geladen werden');
                }
                return response.text();
            })
            .then(html => {

                // HTML parsen
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Nur den Inhalt von <main> übernehmen
                const mainContent = doc.querySelector('main');

                if (mainContent) {
                    document.getElementById('content').innerHTML = mainContent.innerHTML;
                } else {
                    document.getElementById('content').innerHTML =
                        '<p>Kein Main-Inhalt gefunden.</p>';
                }
            })
            .catch(error => {
                console.error('Fehler beim Laden:', error);

                document.getElementById('content').innerHTML =
                    '<p>Fehler beim Laden der Seite.</p>';
            });
    </script>

</body>

</html>
