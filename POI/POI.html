<!DOCTYPE html>
<html lang="de">

<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/POI.css">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css" />
    <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>

    <title>BUGA POI</title>
</head>

<body>

    <header>
        <div class="header-container">

            <div class="logo-group">

                <div class="logo">
                    <img src="img/Logo_Wuppertal.jpg" alt="Logo">
                </div>

                <div class="logo">
                    <h1>
                        <span>Bundesgartenschau</span>
                        <span>Wuppertal</span>
                    </h1>
                </div>

            </div>

            <div id="dropdown-menu"></div>

        </div>
    </header>

    <!-- Hier wird der Inhalt eingefügt -->
    <main id="content">
        <p>Inhalt wird geladen...</p>
    </main>

    <footer>
        <div class="footer-container">
            <a href="index.html">Startseite</a>
            <a href="ueber-uns.html">Über uns</a>
            <a href="impressum.html">Impressum</a>
        </div>
    </footer>

    <script src="scripts/dropdown.js"></script>

    <script>
        fetch('POI/index.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Datei konnte nicht geladen werden');
                }

                return response.text();
            })
            .then(html => {

                // HTML parsen
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Alles aus dem Body holen
                const bodyChildren = [...doc.body.children];

                // Container leeren
                const content = document.getElementById('content');
                content.innerHTML = '';

                bodyChildren.forEach(element => {

                    // Unerwünschte Elemente überspringen
                    if (
                        element.tagName === 'SCRIPT' ||
                        element.tagName === 'STYLE'
                    ) {
                        return;
                    }

                    // Element kopieren
                    content.appendChild(element.cloneNode(true));
                });

                // Externe Scripts aus index.html manuell laden
                const scripts = doc.querySelectorAll('script[src]');

                scripts.forEach(oldScript => {

                    const newScript = document.createElement('script');

                    newScript.src = oldScript.src;

                    document.body.appendChild(newScript);
                });
            })
            .catch(error => {

                console.error('Fehler beim Laden:', error);

                document.getElementById('content').innerHTML =
                    '<p>Fehler beim Laden der Seite.</p>';
            });
    </script>

</body>

</html>
